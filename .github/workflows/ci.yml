name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CI only needs lightweight core deps used by smoke/regression checks.
          pip install requests psutil
          pip install flake8

      - name: Static compile check
        run: python -m compileall -q .

      - name: Lint
        run: flake8 . || true

      - name: Run smoke test (skip health)
        env:
          SKIP_HEALTH: '1'
        run: python smoke_test.py

      - name: Run regression gate
        run: python run_regression.py

  runtime-deps-health:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install full runtime dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Runtime import probe (advisory)
        run: |
          python -c "import requests, psutil; print('core deps ok')"
          python -c "import sounddevice, scipy, pyttsx3; print('audio deps import ok')"
