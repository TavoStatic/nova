name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          # CI only needs lightweight core deps used by smoke/regression checks.
          for i in 1 2 3; do python3 -m pip install requests psutil flake8 && break || sleep 5; done

      - name: Static compile check
        run: python3 -m compileall -q .

      - name: Lint
        run: python3 -m flake8 . || true

      - name: Run smoke test (skip health)
        env:
          SKIP_HEALTH: '1'
        run: python3 smoke_test.py

      - name: Run regression gate
        run: python3 run_regression.py

  runtime-deps-health:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install host audio libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev espeak-ng

      - name: Install full runtime dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python3 -m pip install -r requirements.txt; fi

      - name: Runtime import probe (advisory)
        run: |
          python3 - <<'PY'
          import importlib

          modules = [
            ("requests", True),
            ("psutil", True),
            ("sounddevice", False),
            ("scipy", False),
            ("pyttsx3", False),
          ]
          hard_fail = []
          soft_fail = []
          for name, required in modules:
            try:
              importlib.import_module(name)
              print(f"ok:{name}")
            except Exception as exc:
              row = f"{name}: {exc}"
              if required:
                hard_fail.append(row)
              else:
                soft_fail.append(row)

          if soft_fail:
            print("optional_runtime_import_failures:")
            for row in soft_fail:
              print(f"- {row}")

          if hard_fail:
            print("required_runtime_import_failures:")
            for row in hard_fail:
              print(f"- {row}")
            raise SystemExit(1)
          PY
