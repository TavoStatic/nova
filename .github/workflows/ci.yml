name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Python diagnostics
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CI only needs lightweight core deps used by smoke/regression checks.
          ok=0
          for i in 1 2 3; do
            if python -m pip install requests psutil flake8; then
              ok=1
              break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "Dependency installation failed after retries"
            exit 1
          fi

      - name: Verify core imports
        run: python -c "import requests, psutil; print('core_imports_ok')"

      - name: Static compile check
        run: python -m compileall -q .

      - name: Lint
        run: python -m flake8 . || true

      - name: Run validation checks
        env:
          SKIP_HEALTH: '1'
        run: |
          smoke_ok=1
          regression_ok=1

          echo "Running smoke test..."
          python smoke_test.py || smoke_ok=0

          echo "Running regression gate..."
          python run_regression.py || regression_ok=0

          if [ "$smoke_ok" -ne 1 ]; then
            echo "::error::smoke_test_failed"
          fi
          if [ "$regression_ok" -ne 1 ]; then
            echo "::error::regression_gate_failed"
          fi

          if [ "$smoke_ok" -ne 1 ] || [ "$regression_ok" -ne 1 ]; then
            exit 1
          fi

  runtime-deps-health:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Python diagnostics
        run: |
          python --version
          python -m pip --version

      - name: Install host audio libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev espeak-ng

      - name: Install full runtime dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Runtime import probe (advisory)
        run: |
          python - <<'PY'
          import importlib

          modules = [
            ("requests", True),
            ("psutil", True),
            ("sounddevice", False),
            ("scipy", False),
            ("pyttsx3", False),
          ]
          hard_fail = []
          soft_fail = []
          for name, required in modules:
            try:
              importlib.import_module(name)
              print(f"ok:{name}")
            except Exception as exc:
              row = f"{name}: {exc}"
              if required:
                hard_fail.append(row)
              else:
                soft_fail.append(row)

          if soft_fail:
            print("optional_runtime_import_failures:")
            for row in soft_fail:
              print(f"- {row}")

          if hard_fail:
            print("required_runtime_import_failures:")
            for row in hard_fail:
              print(f"- {row}")
            raise SystemExit(1)
          PY
