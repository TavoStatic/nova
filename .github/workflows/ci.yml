name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CI only needs lightweight core deps used by smoke/regression checks.
          pip install requests psutil
          pip install flake8

      - name: Static compile check
        run: python -m compileall -q .

      - name: Lint
        run: flake8 . || true

      - name: Run smoke test (skip health)
        env:
          SKIP_HEALTH: '1'
        run: python smoke_test.py

      - name: Run regression gate
        run: python run_regression.py

  runtime-deps-health:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install host audio libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev espeak-ng

      - name: Install full runtime dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Runtime import probe (advisory)
        run: |
          python - <<'PY'
          import importlib

          modules = [
            ("requests", True),
            ("psutil", True),
            ("sounddevice", False),
            ("scipy", False),
            ("pyttsx3", False),
          ]
          hard_fail = []
          soft_fail = []
          for name, required in modules:
            try:
              importlib.import_module(name)
              print(f"ok:{name}")
            except Exception as exc:
              row = f"{name}: {exc}"
              if required:
                hard_fail.append(row)
              else:
                soft_fail.append(row)

          if soft_fail:
            print("optional_runtime_import_failures:")
            for row in soft_fail:
              print(f"- {row}")

          if hard_fail:
            print("required_runtime_import_failures:")
            for row in hard_fail:
              print(f"- {row}")
            raise SystemExit(1)
          PY
