name: Smoke E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cross-platform dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only cross-platform deps; skip Windows-only (winsdk) and
          # audio deps that require system libs not present in CI.
          python -m pip install requests psutil

      - name: Run smoke e2e
        run: |
          python scripts/smoke_e2e.py
